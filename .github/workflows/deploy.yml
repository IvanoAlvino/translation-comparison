name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, cancelling older in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Base-href must match the repo name for project Pages (served under /<repo>/).
      - run: npm run build -- --base-href=/translation-comparison/
      # SPA fallback: serve index.html for unknown routes (e.g. /admin).
      - run: cp dist/translation-comparison/browser/index.html dist/translation-comparison/browser/404.html
      # Prevent GitHub Pages from running Jekyll over the build output.
      - run: touch dist/translation-comparison/browser/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/translation-comparison/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
